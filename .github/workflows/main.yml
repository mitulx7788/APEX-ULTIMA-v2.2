name: "RDP-ProAccess (APEX-ULTIMA) v2.2 — Sovereign Apex Fabric"

# ═══════════════════════════════════════════════════════════════════════════
#  RDP-ProAccess — APEX-ULTIMA Edition v2.2 (Sovereign Apex Fabric)
#  THE MOST ADVANCED RDP-on-GitHub-Actions workflow currently possible
# ═══════════════════════════════════════════════════════════════════════════
#  Built with full engineering freedom for maximum performance, resilience,
#  observability, and long-term maintainability when you ONLY use Tailscale.
#
#  Core Philosophy
#  • Tailscale is the ONLY access path (ACLs strongly recommended)
#  • Zero-trust, self-healing, observable sovereign fabric
#  • Blazing fast + rock-solid RDP experience over WireGuard
#  • Enterprise-grade PowerShell engineering inside GitHub Actions
#
#  v2.2 Highlights (Major Leap)
#  • APEX-Core v2.2 with advanced helper library + background monitor
#  • Background Self-Healing Monitor (parallel job during session hold)
#  • Periodic System Telemetry Snapshots (CPU/RAM/Network/Tailscale)
#  • Further refined Network God-Mode + RDP response tuning
#  • Stricter sovereign security defaults + graceful degradation everywhere
#  • Richer structured logging + post-run diagnostics
# ═══════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      ts_tailnet:
        description: "Tailscale tailnet (e.g. you@gmail.com)"
        required: true
      quick_test:
        description: "Run 5-minute test"
        type: boolean
        default: false
      runtime_minutes:
        description: "Runtime in minutes (355 max recommended)"
        required: false
        default: "355"
      do_purge:
        description: "Purge bullet* devices (single-instance mode only)"
        required: false
        default: "true"
      cycles:
        description: "0 = stop after run; N = remaining handoffs (incl. current)"
        required: false
        default: "0"
      rdp_count:
        description: "Parallel RDP instances (1-10). CRD forces single instance."
        required: false
        default: "1"
      crd_code:
        description: "CRD code / full command / URL with code. Forces single instance."
        required: false
        default: ""
      crd_pin:
        description: "CRD PIN (6-12 digits)"
        required: false
        default: "123456"
      enable_heartbeat:
        description: "Send periodic heartbeat + telemetry during session"
        type: boolean
        default: true

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

env:
  APEX_VERSION: "2.2.0-SOVEREIGN-APEX-FABRIC"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
      multi: ${{ steps.mk.outputs.multi }}
    steps:
      - id: mk
        env:
          CRD: ${{ inputs.crd_code }}
          COUNT: ${{ inputs.rdp_count }}
        run: |
          $crd = ($env:CRD | Out-String).Trim()
          $n = if ($crd.Length -gt 3) { 1 } else { [math]::Max(1, [math]::Min(10, [int]$env:COUNT)) }
          
          # Force an array even if $n = 1 to satisfy GitHub Actions matrix schema
          $inc = @(1..$n | ForEach-Object { @{ id = $_ } })
          $matrixJson = @{ include = $inc } | ConvertTo-Json -Compress -Depth 5
          
          Add-Content -Path $env:GITHUB_OUTPUT -Value "matrix=$matrixJson"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "multi=$([int]($n -gt 1))"

  rdp:
    needs: setup
    runs-on: windows-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      max-parallel: 10
      fail-fast: false
    timeout-minutes: 360

    env:
      TS_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
      TS_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
      PASS: ${{ secrets.RDP_PASSWORD }}
      TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
      RDP_USER: ProAccessVIP
      TS_TAILNET: ${{ inputs.ts_tailnet }}
      QUICK_TEST: ${{ inputs.quick_test }}
      RUNTIME_INPUT: ${{ inputs.runtime_minutes }}
      DO_PURGE: ${{ inputs.do_purge }}
      CYCLES_INPUT: ${{ inputs.cycles }}
      RDP_COUNT: ${{ inputs.rdp_count }}
      CRD_CODE_RAW: ${{ inputs.crd_code }}
      CRD_PIN: ${{ inputs.crd_pin }}
      ENABLE_HEARTBEAT: ${{ inputs.enable_heartbeat }}
      MATRIX_ID: ${{ matrix.id }}
      MULTI_FLAG: ${{ needs.setup.outputs.multi }}

    steps:
      # ════════════════════════════════════════════════════════════════════
      # STEP 1 — ⚡ APEX Downloader + Core Bootstrap v2.2
      # ════════════════════════════════════════════════════════════════════
      - name: "⚡ APEX Downloader + Core Bootstrap v2.2"
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Path "C:\Setup\logs","C:\Setup\scripts" -Force | Out-Null
          Start-Transcript -Path "C:\Setup\logs\01_downloader.log" -Append

          Write-Host "═══════════════════════════════════════════════════════════════" -ForegroundColor Cyan
          Write-Host "  APEX-ULTIMA v${env:APEX_VERSION}" -ForegroundColor Cyan
          Write-Host "  THE MOST ADVANCED RDP-on-GitHub-Actions Sovereign Fabric" -ForegroundColor Cyan
          Write-Host "  Tailscale-Only • Self-Healing • Blazing Performance • Full Observability" -ForegroundColor Cyan
          Write-Host "═══════════════════════════════════════════════════════════════" -ForegroundColor Cyan

          $Global:Apex = [ordered]@{
              Version          = $env:APEX_VERSION
              MatrixId         = [int]$env:MATRIX_ID
              IsMulti          = $env:MULTI_FLAG -eq '1'
              CrdEnabled       = $false
              Hostname         = if ($env:MULTI_FLAG -eq '1' -and ($env:CRD_CODE_RAW | Out-String).Trim().Length -le 3) { "bullet$($env:MATRIX_ID)" } else { "bullet" }
              RuntimeMinutes   = 355
              TailscaleIP      = $null
              RustDeskUrl      = $null
              StartTime        = Get-Date
              EventsLog        = "C:\Setup\apex-events.jsonl"
              MetricsLog       = "C:\Setup\apex-metrics.jsonl"
          }

          function Write-ApexEvent {
              param([string]$Level = "INFO", [string]$Message, [hashtable]$Data = @{})
              $evt = [ordered]@{ ts = (Get-Date).ToString("o"); level = $Level.ToUpper(); msg = $Message; matrix = $Global:Apex.MatrixId; data = $Data }
              Add-Content -Path $Global:Apex.EventsLog -Value ($evt | ConvertTo-Json -Compress -Depth 5) -Encoding utf8
              $color = switch ($Level) { "ERROR" { "Red" } "WARN" { "Yellow" } "SUCCESS" { "Green" } default { "Cyan" } }
              Write-Host "[$((Get-Date).ToString('HH:mm:ss'))] [$Level] $Message" -ForegroundColor $color
          }

          function Invoke-ApexRetry {
              param([scriptblock]$Block, [int]$Max = 3, [int]$Delay = 4, [string]$Name = "Operation")
              for ($i = 1; $i -le $Max; $i++) {
                  try { $result = & $Block; if ($i -gt 1) { Write-ApexEvent "SUCCESS" "$Name succeeded on retry $i" }; return $result }
                  catch { Write-ApexEvent "WARN" "$Name attempt $i failed: $($_.Exception.Message)"; if ($i -eq $Max) { throw }; Start-Sleep -Seconds ($Delay * $i) }
              }
          }

          function Send-ApexTelegram { param([string]$Text, [string]$ParseMode = "Markdown")
              if (-not $env:TG_TOKEN -or -not $env:TG_CHAT) { return $false }
              try { Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TG_TOKEN)/sendMessage" -Method Post -Body @{ chat_id = $env:TG_CHAT; text = $Text; parse_mode = $ParseMode } -ErrorAction Stop | Out-Null; return $true }
              catch { return $false }
          }

          function Get-SystemMetrics {
              $os = Get-CimInstance Win32_OperatingSystem
              try { $cpu = (Get-Counter '\Processor(_Total)\% Processor Time' -SampleInterval 1 -MaxSamples 1 -ErrorAction SilentlyContinue).CounterSamples.CookedValue } catch { $cpu = 0 }
              $net = Get-NetAdapter | Where-Object Status -eq 'Up' | Select-Object -First 1
              $stats = if($net){ $net | Get-NetAdapterStatistics } else { $null }
              return [ordered]@{
                  timestamp     = (Get-Date).ToString("o")
                  free_ram_gb   = [math]::Round($os.FreePhysicalMemory / 1MB, 2)
                  cpu_load_pct  = [math]::Round($cpu, 1)
                  network_sent_mb = if ($stats) { [math]::Round($stats.SentBytes / 1MB, 2) } else { 0 }
                  network_recv_mb = if ($stats) { [math]::Round($stats.ReceivedBytes / 1MB, 2) } else { 0 }
              }
          }

          # CRD decision
          $crdRaw = ($env:CRD_CODE_RAW | Out-String).Trim()
          $Global:Apex.CrdEnabled = $crdRaw.Length -gt 3
          if ($Global:Apex.CrdEnabled) { Write-ApexEvent "INFO" "CRD mode — single instance forced" }

          # Runtime
          $rt = if ([bool]::Parse($env:QUICK_TEST)) { 5 } elseif ([int]$env:RUNTIME_INPUT -ge 6 -and [int]$env:RUNTIME_INPUT -le 360) { [int]$env:RUNTIME_INPUT } else { 355 }
          $Global:Apex.RuntimeMinutes = $rt
          [Environment]::SetEnvironmentVariable("RUNTIME_MINUTES", $rt, "Process")
          Write-ApexEvent "INFO" "Hostname: $($Global:Apex.Hostname) | Runtime: $rt min | CRD: $($Global:Apex.CrdEnabled)"

          # Downloads (pinned latest)
          choco install aria2 -y --no-progress --limit-output 2>&1 | Out-Null
          $aria = (Get-Command aria2c.exe -ErrorAction SilentlyContinue).Source ?? "C:\ProgramData\chocolatey\bin\aria2c.exe"

          function Get-ApexFile($Url, $OutDir, $OutName, $Label) {
              $dest = Join-Path $OutDir $OutName
              if (Test-Path $dest) { Write-ApexEvent "INFO" "$Label already present"; return $dest }
              if (Test-Path $aria) {
                  $args = @("--dir=$OutDir","--out=$OutName","--max-connection-per-server=16","--split=16","--min-split-size=1M",
                            "--max-tries=8","--retry-wait=3","--connect-timeout=20","--timeout=90","--auto-file-renaming=false",
                            "--allow-overwrite=true","--console-log-level=warn","--check-certificate=true",$Url)
                  for ($i = 1; $i -le 3; $i++) {
                      & $aria @args 2>&1 | Out-Null
                      if ($LASTEXITCODE -eq 0 -and (Test-Path $dest)) { Write-ApexEvent "SUCCESS" "$Label OK"; return $dest }
                      Start-Sleep -Seconds (3 * $i)
                  }
              }
              Start-BitsTransfer -Source $Url -Destination $dest -ErrorAction Stop
              return $dest
          }

          Get-ApexFile "https://www.7-zip.org/a/7z2602-x64.exe" "C:\Setup" "7z.exe" "7-Zip 26.02"
          Get-ApexFile "https://pkgs.tailscale.com/stable/tailscale-setup-1.98.8-amd64.msi" "C:\Setup" "tailscale.msi" "Tailscale 1.98.8"
          Get-ApexFile "https://github.com/rustdesk/rustdesk/releases/download/1.4.9/rustdesk-1.4.9-x86_64.msi" "C:\Setup" "rustdesk.msi" "RustDesk 1.4.9"
          Get-ApexFile "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" "C:\Setup" "crdhost.msi" "CRD Host"

          # Early power & time
          powercfg /change standby-timeout-ac 0; powercfg /change monitor-timeout-ac 0; powercfg /change hibernate-timeout-ac 0; powercfg /hibernate off
          reg add "HKLM\Software\Policies\Microsoft\Windows\Personalization" /v NoLockScreen /t REG_DWORD /d 1 /f | Out-Null
          w32tm /config /manualpeerlist:"time.cloudflare.com,0x8 pool.ntp.org,0x8" /syncfromflags:manual /reliable:yes /update | Out-Null
          Restart-Service w32time -Force -ErrorAction SilentlyContinue; w32tm /resync /force | Out-Null

          # APEX-Core v2.2 Bootstrap (Fixed YAML parsing)
          $core = "C:\Setup\scripts\APEX-Core.ps1"
          @'
          # APEX-Core v2.2 — Sovereign Apex Fabric Functions Library
          $ErrorActionPreference = 'Continue'

          function Write-ApexEvent { param([string]$Level="INFO",[string]$Message,[hashtable]$Data=@{})
              $evt = [ordered]@{ts=(Get-Date).ToString("o");level=$Level.ToUpper();msg=$Message;matrix=$env:MATRIX_ID;data=$Data}
              Add-Content "C:\Setup\apex-events.jsonl" -Value ($evt | ConvertTo-Json -Compress -Depth 5) -Encoding utf8
              $c = @{ERROR="Red";WARN="Yellow";SUCCESS="Green";INFO="Cyan"}[$Level]; if(-not $c){$c="White"}
              Write-Host "[$((Get-Date).ToString('HH:mm:ss'))] [$Level] $Message" -ForegroundColor $c
          }

          function Invoke-ApexRetry { param([scriptblock]$Block,[int]$Max=3,[int]$Delay=4,[string]$Name="Op")
              for($i=1;$i -le $Max;$i++){ try{ $r=&$Block; if($i-gt1){Write-ApexEvent SUCCESS "$Name retry $i OK"};return $r}catch{Write-ApexEvent WARN "$Name attempt $i failed";if($i-eq$Max){throw};Start-Sleep($Delay*$i)} }
          }

          function Wait-ApexService { param([string]$Name,[int]$TimeoutSec=90)
              $deadline=(Get-Date).AddSeconds($TimeoutSec); while((Get-Date)-lt $deadline){ if((Get-Service $Name -ErrorAction SilentlyContinue).Status -in 'Running','StartPending'){return $true}; Start-Sleep 3 }; return $false
          }

          function Get-CrdLaunchParameters { param([string]$Raw,[string]$Pin)
              if([string]::IsNullOrWhiteSpace($Raw)){return $null}
              $raw=$Raw.Trim(); $pin=if($Pin-match'^\d{6,12}$'){$Pin}else{"123456"}
              $code=$null; $isFull=$false
              if($raw -match 'remoting_start_host\.exe'){$isFull=$true}
              if($raw -match '--code\s*=\s*"?([^"\s]+)"?'){$code=$Matches[1]}
              elseif($raw -match '^4\/[A-Za-z0-9_-]{20,}'){$code=$raw}
              elseif($raw -match '[?&]code=(4[^&\s"]+)'){$code=$Matches[1]}
              elseif($raw -match '(?i)code["\s:=]+(4\/[A-Za-z0-9_-]{20,})'){$code=$Matches[1]}
              elseif($raw -match '(4\/[A-Za-z0-9_-]{25,})'){$code=$Matches[1]}
              if($code -and $code.Length -gt 10){
                  return @{IsFullCommand=$isFull;Code=$code;Pin=$pin;Args=@("--code=""$code""","--redirect-url=""https://remotedesktop.google.com/_/oauthredirect""","--name=""$env:COMPUTERNAME""","--pin=""$pin""");Raw=$raw}
              }
              Write-ApexEvent ERROR "CRD parser failed"; return $null
          }

          function Send-ApexTelegram { param([string]$Text)
              if(-not $env:TG_TOKEN -or -not $env:TG_CHAT){return $false}
              try{ Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TG_TOKEN)/sendMessage" -Method Post -Body @{chat_id=$env:TG_CHAT;text=$Text;parse_mode="Markdown"} -ErrorAction Stop | Out-Null; return $true }catch{return $false}
          }

          function Get-SystemMetrics {
              $os = Get-CimInstance Win32_OperatingSystem
              try { $cpu = (Get-Counter '\Processor(_Total)\% Processor Time' -SampleInterval 1 -MaxSamples 1 -ErrorAction SilentlyContinue).CounterSamples.CookedValue } catch { $cpu = 0 }
              $net = Get-NetAdapter | Where-Object Status -eq 'Up' | Select-Object -First 1
              $stats = if($net){ $net | Get-NetAdapterStatistics } else { $null }
              return [ordered]@{
                  ts = (Get-Date).ToString("o")
                  free_ram_gb = [math]::Round($os.FreePhysicalMemory / 1MB, 2)
                  cpu_load_pct = [math]::Round($cpu, 1)
                  net_sent_mb = if($stats){ [math]::Round($stats.SentBytes / 1MB, 2) } else { 0 }
                  net_recv_mb = if($stats){ [math]::Round($stats.ReceivedBytes / 1MB, 2) } else { 0 }
              }
          }

          function Test-TailscaleHealth {
              param([string]$TsPath = "C:\Program Files\Tailscale\tailscale.exe")
              if(-not (Test-Path $TsPath)){ return $false }
              try {
                  $status = & $TsPath status --json 2>$null | ConvertFrom-Json -ErrorAction SilentlyContinue
                  return $status -and $status.BackendState -eq "Running"
              } catch { return $false }
          }

          Write-ApexEvent SUCCESS "APEX-Core v2.2 (Sovereign Apex Fabric) loaded successfully"
          '@ | Set-Content $core -Encoding utf8

          Write-ApexEvent "SUCCESS" "APEX-Core v2.2 bootstrapped with advanced helpers + telemetry"
          Stop-Transcript

      # ════════════════════════════════════════════════════════════════════
      # STEP 2 — 🛡️ APEX Kernel v2.2 + Network God-Mode + RDP Sovereign Tuning
      # ════════════════════════════════════════════════════════════════════
      - name: "🛡️ APEX Kernel v2.2 + Network God-Mode + RDP Sovereign Tuning"
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          . "C:\Setup\scripts\APEX-Core.ps1"
          Start-Transcript -Path "C:\Setup\logs\02_kernel.log" -Append
          Write-ApexEvent "INFO" "Applying APEX Kernel v2.2 + Sovereign Network & RDP God-Mode..."

          # High-precision timer
          try {
              Add-Type -TypeDefinition 'using System; using System.Runtime.InteropServices; public class TimerRes {[DllImport("ntdll.dll")] public static extern int NtSetTimerResolution(uint d, bool s, out uint c);}' -ErrorAction Stop
              [TimerRes]::NtSetTimerResolution(5000, $true, [ref]([uint32]0)) | Out-Null
              Write-ApexEvent "SUCCESS" "System timer locked at 0.5ms"
          } catch { Write-ApexEvent "WARN" "Timer OC warning" }

          # Ultimate Performance + disable core parking
          powercfg -duplicatescheme e9a42b02-d5df-448d-aa00-03f14749eb61 | Out-Null
          $scheme = (powercfg -list | Select-String "e9a42b02-d5df-448d-aa00-03f14749eb61").Line
          if($scheme -match "([0-9a-f-]{36})"){ powercfg -setactive $Matches[1] } else { powercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c }
          @("SUB_PROCESSOR PROCTHROTTLEMIN 100","SUB_PROCESSOR PROCTHROTTLEMAX 100","SUB_PROCESSOR PERFBOOSTMODE 2",
            "SUB_PROCESSOR CPMINCORES 100","SUB_PROCESSOR CPMAXCORES 100","SUB_PROCESSOR IDLEDISABLE 1","SUB_PCIEXPRESS ASPM 0") | ForEach-Object {
              powercfg -setacvalueindex SCHEME_CURRENT $_
          }
          powercfg -setactive SCHEME_CURRENT
          Write-ApexEvent "SUCCESS" "Ultimate Performance + core parking disabled"

          # Aggressive debloat + Defender off
          $bloat = @("wuauserv","DoSvc","SysMain","DiagTrack","WSearch","BITS","MapsBroker","EdgeUpdate","Spooler","WerSvc","RetailDemo","XblAuthManager","XblGameSave","dmwappushservice","PcaSvc","Fax","WbioSrvc","Themes","TabletInputService")
          $bloat | ForEach-Object { Stop-Service $_ -Force -ErrorAction SilentlyContinue; Set-Service $_ -StartupType Disabled -ErrorAction SilentlyContinue }
          Set-MpPreference -DisableRealtimeMonitoring $true -DisableIOAVProtection $true -DisableArchiveScanning $true -DisableBehaviorMonitoring $true -SubmitSamplesConsent 2 -Force -ErrorAction SilentlyContinue
          Set-MpPreference -ExclusionPath "C:\","D:\" -Force -ErrorAction SilentlyContinue
          reg add "HKLM\SOFTWARE\Policies\Microsoft\Windows Defender" /v DisableAntiSpyware /t REG_DWORD /d 1 /f | Out-Null
          Write-ApexEvent "SUCCESS" "Defender + telemetry bloat neutralized"

          # RDP base + Sovereign Performance Tuning
          $rdpTcp = "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp"
          $tsCtrl = "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server"
          $tsPol  = "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services"
          if(-not (Test-Path $tsPol)){ New-Item $tsPol -Force | Out-Null }

          Set-ItemProperty $rdpTcp ColorDepth 5 -Type DWord -Force
          Set-ItemProperty $rdpTcp MinSendInterval 3 -Type DWord -Force
          Set-ItemProperty $rdpTcp fEnableWinStation 1 -Type DWord -Force
          Set-ItemProperty $tsPol SelectTransport 0 -Type DWord -Force
          Set-ItemProperty $tsPol fClientDisableUDP 0 -Type DWord -Force
          Set-ItemProperty $tsPol fServerDisableUDP 0 -Type DWord -Force
          Set-ItemProperty $tsCtrl KeepAliveEnable 1 -Type DWord -Force
          Set-ItemProperty $tsCtrl KeepAliveInterval 1 -Type DWord -Force
          New-NetFirewallRule -DisplayName "RDP-UDP-3389-In" -Direction Inbound -LocalPort 3389 -Protocol UDP -Action Allow -ErrorAction SilentlyContinue | Out-Null

          # === RDP Sovereign Blazing Response Tuning ===
          Set-ItemProperty $rdpTcp fEnableCompression 1 -Type DWord -Force
          Set-ItemProperty $rdpTcp fEnableAutoReconnect 1 -Type DWord -Force
          Set-ItemProperty $rdpTcp BitmapCacheSize 4096 -Type DWord -Force
          Set-ItemProperty $rdpTcp fEnablePersistentBitmapCaching 1 -Type DWord -Force
          Set-ItemProperty $rdpTcp fAutoClientDrives 0 -Type DWord -Force
          Set-ItemProperty $rdpTcp fAutoClientLpts 0 -Type DWord -Force
          Set-ItemProperty $tsPol fEnableSmartCard 0 -Type DWord -Force
          Set-ItemProperty $tsPol fPromptForPassword 0 -Type DWord -Force
          Set-ItemProperty $tsPol fDisableCam 1 -Type DWord -Force
          Set-ItemProperty $tsPol fDisableLPT 1 -Type DWord -Force
          Set-ItemProperty $tsPol fDisableCcm 1 -Type DWord -Force
          Set-ItemProperty $tsPol fDisableClip 0 -Type DWord -Force
          Write-ApexEvent "SUCCESS" "RDP protocol tuned for maximum responsiveness over Tailscale"

          # Nagle death + immediate ACK
          Get-ChildItem "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters\Interfaces" | ForEach-Object {
              Set-ItemProperty $_.PSPath TcpAckFrequency 1 -Type DWord -Force -ErrorAction SilentlyContinue
              Set-ItemProperty $_.PSPath TCPNoDelay 1 -Type DWord -Force -ErrorAction SilentlyContinue
          }

          # === Network God-Mode v2.2 (Maximum Tailscale Performance) ===
          Write-ApexEvent "INFO" "Applying Sovereign Network God-Mode v2.2..."

          Get-NetAdapter | Where-Object Status -eq 'Up' | Disable-NetAdapterPowerManagement -ErrorAction SilentlyContinue

          netsh int tcp set global fastopen=enabled fastopenfallback=enabled | Out-Null
          netsh int tcp set supplemental template=internet congestionprovider=bbr2 initialRto=2000 minRto=300 | Out-Null
          netsh int tcp set supplemental template=datacenter congestionprovider=bbr2 | Out-Null
          netsh int tcp set global autotuninglevel=experimental rss=enabled timestamps=enabled windowscaling=enabled sackopts=enabled ecncapability=enabled initialRto=2000

          $cc = "CUBIC"
          try {
              Set-NetTCPSetting -SettingName InternetCustom -CongestionProvider BBR2 -InitialRto 2000 -MinRto 300 -ErrorAction Stop
              $cc = "BBR2"
              Write-ApexEvent "SUCCESS" "BBR2 engaged (optimal for Tailscale)"
          } catch {
              Set-NetTCPSetting -SettingName InternetCustom -CongestionProvider CUBIC -InitialRto 2000 -MinRto 300 -ErrorAction SilentlyContinue
          }
          Set-Content "C:\Setup\cc_provider.txt" -Value $cc

          Disable-NetAdapterChecksumOffload -Name "*" -TcpIPv4 -ErrorAction SilentlyContinue
          Disable-NetAdapterLso -Name "*" -IPv4 -ErrorAction SilentlyContinue
          Enable-NetAdapterRss -Name "*" -ErrorAction SilentlyContinue

          $afd = "HKLM:\SYSTEM\CurrentControlSet\Services\AFD\Parameters"
          if(-not (Test-Path $afd)){ New-Item $afd -Force | Out-Null }
          Set-ItemProperty $afd FastSendDatagramThreshold 1500 -Type DWord -Force
          Set-ItemProperty $afd DefaultReceiveWindow 2097152 -Type DWord -Force
          Set-ItemProperty $afd DefaultSendWindow 2097152 -Type DWord -Force
          Set-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" MaximumReassemblyHeaders 0xffff -Type DWord -Force
          Set-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" MaxUserPort 65534 -Type DWord -Force
          Set-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" TcpNumConnections 0xfffffe -Type DWord -Force
          Set-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" TcpTimedWaitDelay 30 -Type DWord -Force
          Set-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" KeepAliveTime 30000 -Type DWord -Force
          Set-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" KeepAliveInterval 1000 -Type DWord -Force

          Set-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile" NetworkThrottlingIndex 0xffffffff -Force
          Set-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile" SystemResponsiveness 0 -Force

          New-NetQosPolicy -Name "RDP-QoS" -AppPathNameMatchCondition "svchost.exe" -DSCPAction 46 -NetworkProfile All -ErrorAction SilentlyContinue | Out-Null
          New-NetQosPolicy -Name "Tailscale-QoS" -AppPathNameMatchCondition "tailscaled.exe" -DSCPAction 46 -NetworkProfile All -ErrorAction SilentlyContinue | Out-Null

          $iface = Get-NetAdapter | Where-Object {$_.Status -eq 'Up' -and $_.Name -notmatch "Tailscale"} | Select-Object -First 1
          if($iface){ Set-DnsClientServerAddress -InterfaceIndex $iface.InterfaceIndex -ServerAddresses ("1.1.1.1","1.0.0.1") }

          # RDP user
